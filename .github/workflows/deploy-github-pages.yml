# Build static export (out/) and deploy to GitHub Pages.
# Repo settings → Pages → Source: GitHub Actions.

name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
      # Remove after merging if you only want production deploys from main
      - fix/globaldatabase-layout

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build static site
        env:
          # Default: project URL https://<user>.github.io/<repo>/
          # For a user site (repo name must be <user>.github.io), override this
          # step env to: GITHUB_PAGES_BASE_PATH: ""
          GITHUB_PAGES_BASE_PATH: /${{ github.event.repository.name }}
        run: bun run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
